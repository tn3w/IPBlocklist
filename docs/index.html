<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>IPBlocklist Threat Intelligence Lookup</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0a0a0f;
                --surface: #12121a;
                --surface-2: #1a1a26;
                --surface-3: #22222f;
                --border: #2a2a3a;
                --border-hover: #3a3a5a;
                --text: #e4e4ef;
                --text-dim: #8888a0;
                --text-muted: #55556a;
                --accent: #6366f1;
                --accent-dim: #4f46e5;
                --danger: #ef4444;
                --danger-dim: rgba(239, 68, 68, 0.12);
                --warn: #f59e0b;
                --warn-dim: rgba(245, 158, 11, 0.12);
                --safe: #22c55e;
                --safe-dim: rgba(34, 197, 94, 0.12);
                --info: #3b82f6;
                --info-dim: rgba(59, 130, 246, 0.12);
                --radius: 10px;
                --radius-sm: 6px;
                --mono: 'JetBrains Mono', monospace;
                --sans: 'Outfit', system-ui, sans-serif;
            }

            html {
                font-size: 15px;
            }
            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--sans);
                min-height: 100vh;
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
            }

            .noise {
                position: fixed;
                inset: 0;
                z-index: -1;
                opacity: 0.025;
                pointer-events: none;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            }

            .glow {
                position: fixed;
                top: -200px;
                left: 50%;
                transform: translateX(-50%);
                width: 800px;
                height: 500px;
                background: radial-gradient(ellipse, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
                pointer-events: none;
                z-index: -1;
            }

            header {
                padding: 2.5rem 2rem 0;
                max-width: 900px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
                flex-wrap: wrap;
            }

            .logo-group {
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
                border-radius: 8px;
                background: linear-gradient(135deg, var(--accent), #818cf8);
                display: grid;
                place-items: center;
                font-weight: 800;
                font-size: 1rem;
                color: #fff;
                flex-shrink: 0;
            }

            .logo-text {
                font-weight: 700;
                font-size: 1.35rem;
                letter-spacing: -0.03em;
            }

            .logo-text span {
                color: var(--text-dim);
                font-weight: 400;
            }

            .github-link {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                color: var(--text-dim);
                text-decoration: none;
                font-size: 0.85rem;
                font-weight: 500;
                padding: 0.45rem 0.9rem;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                transition: all 0.2s;
            }
            .github-link:hover {
                color: var(--text);
                border-color: var(--border-hover);
                background: var(--surface);
            }
            .github-link svg {
                width: 18px;
                height: 18px;
            }

            main {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem;
            }

            .search-section {
                margin-bottom: 2.5rem;
            }

            .search-label {
                font-size: 0.78rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
                margin-bottom: 0.6rem;
            }

            .search-box {
                display: flex;
                gap: 0.5rem;
            }

            .search-input {
                flex: 1;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 0.85rem 1.1rem;
                color: var(--text);
                font-family: var(--mono);
                font-size: 0.95rem;
                outline: none;
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
            }
            .search-input::placeholder {
                color: var(--text-muted);
            }
            .search-input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            }

            .search-btn {
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: var(--radius);
                padding: 0.85rem 1.6rem;
                font-family: var(--sans);
                font-weight: 600;
                font-size: 0.9rem;
                cursor: pointer;
                transition:
                    background 0.2s,
                    transform 0.1s;
                white-space: nowrap;
            }
            .search-btn:hover {
                background: var(--accent-dim);
            }
            .search-btn:active {
                transform: scale(0.97);
            }
            .search-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .status-bar {
                margin-top: 0.8rem;
                font-size: 0.8rem;
                color: var(--text-muted);
                font-family: var(--mono);
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .status-bar .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--text-muted);
                flex-shrink: 0;
            }
            .status-bar.ready .dot {
                background: var(--safe);
            }
            .status-bar.loading .dot {
                background: var(--warn);
                animation: pulse 1s ease infinite;
            }
            .status-bar.error .dot {
                background: var(--danger);
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            #results {
                display: none;
            }
            #results.visible {
                display: block;
            }

            .result-header {
                display: flex;
                align-items: baseline;
                gap: 1rem;
                margin-bottom: 1.5rem;
                flex-wrap: wrap;
            }

            .result-ip {
                font-family: var(--mono);
                font-size: 1.5rem;
                font-weight: 700;
                letter-spacing: -0.02em;
            }

            .result-verdict {
                font-size: 0.82rem;
                font-weight: 600;
                padding: 0.3rem 0.75rem;
                border-radius: 20px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .verdict-high {
                background: var(--danger-dim);
                color: var(--danger);
            }
            .verdict-medium {
                background: var(--warn-dim);
                color: var(--warn);
            }
            .verdict-low {
                background: var(--info-dim);
                color: var(--info);
            }
            .verdict-clean {
                background: var(--safe-dim);
                color: var(--safe);
            }

            .stats-row {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 0.75rem;
                margin-bottom: 2rem;
            }

            .stat-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 1rem 1.1rem;
            }

            .stat-label {
                font-size: 0.72rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
                margin-bottom: 0.3rem;
            }

            .stat-value {
                font-family: var(--mono);
                font-size: 1.2rem;
                font-weight: 600;
            }

            .section-title {
                font-size: 0.78rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
                margin-bottom: 0.8rem;
                margin-top: 1.5rem;
            }

            .tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.4rem;
                margin-bottom: 1.5rem;
            }

            .tag {
                font-size: 0.78rem;
                font-weight: 500;
                padding: 0.3rem 0.7rem;
                border-radius: 20px;
                font-family: var(--mono);
            }

            .tag-flag {
                background: rgba(99, 102, 241, 0.12);
                color: #818cf8;
            }
            .tag-cat {
                background: rgba(245, 158, 11, 0.12);
                color: #fbbf24;
            }

            .feed-list {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                margin-bottom: 2rem;
            }

            .feed-item {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 0.85rem 1rem;
                display: flex;
                align-items: center;
                gap: 0.75rem;
                cursor: default;
                position: relative;
                transition: border-color 0.2s;
            }
            .feed-item:hover {
                border-color: var(--border-hover);
            }

            .feed-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }

            .feed-name {
                font-family: var(--mono);
                font-size: 0.85rem;
                font-weight: 500;
                flex: 1;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .feed-score {
                font-family: var(--mono);
                font-size: 0.8rem;
                font-weight: 600;
                flex-shrink: 0;
            }

            .feed-tags {
                display: flex;
                gap: 0.3rem;
                flex-shrink: 0;
                flex-wrap: wrap;
            }

            .feed-tag {
                font-size: 0.68rem;
                padding: 0.15rem 0.45rem;
                border-radius: 12px;
                font-family: var(--mono);
            }

            .tooltip-card {
                display: none;
                position: absolute;
                bottom: calc(100% + 8px);
                left: 0;
                right: 0;
                background: var(--surface-2);
                border: 1px solid var(--border-hover);
                border-radius: var(--radius);
                padding: 1rem;
                z-index: 100;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
                font-size: 0.82rem;
                line-height: 1.6;
                animation: fadeUp 0.15s ease;
            }

            .feed-item:hover .tooltip-card {
                display: block;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(4px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .tooltip-card .tt-name {
                font-weight: 700;
                font-size: 0.9rem;
                margin-bottom: 0.3rem;
            }
            .tooltip-card .tt-desc {
                color: var(--text-dim);
                margin-bottom: 0.5rem;
            }
            .tooltip-card .tt-row {
                display: flex;
                gap: 0.5rem;
                color: var(--text-dim);
                font-family: var(--mono);
                font-size: 0.75rem;
            }
            .tooltip-card .tt-row strong {
                color: var(--text);
                font-weight: 500;
            }

            .score-bar-outer {
                width: 100%;
                height: 6px;
                background: var(--surface-3);
                border-radius: 3px;
                overflow: hidden;
                margin-top: 0.3rem;
            }
            .score-bar-inner {
                height: 100%;
                border-radius: 3px;
                transition: width 0.4s ease;
            }

            .asn-section {
                margin-bottom: 2rem;
            }

            .prefix-list {
                display: flex;
                flex-wrap: wrap;
                gap: 0.35rem;
                max-height: 220px;
                overflow-y: auto;
                margin-bottom: 1.5rem;
                padding: 0.75rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
            }

            .prefix-tag {
                font-family: var(--mono);
                font-size: 0.76rem;
                padding: 0.2rem 0.5rem;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text-dim);
            }

            .no-matches {
                color: var(--text-dim);
                font-size: 0.9rem;
                padding: 2rem;
                text-align: center;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
            }

            .spinner {
                display: inline-block;
                width: 14px;
                height: 14px;
                border: 2px solid var(--border);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            footer {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem;
                text-align: center;
                font-size: 0.78rem;
                color: var(--text-muted);
                border-top: 1px solid var(--border);
            }

            @media (max-width: 600px) {
                header {
                    padding: 1.5rem 1rem 0;
                }
                main {
                    padding: 1.5rem 1rem;
                }
                .search-box {
                    flex-direction: column;
                }
                .stats-row {
                    grid-template-columns: 1fr 1fr;
                }
                .feed-item {
                    flex-wrap: wrap;
                }
                .feed-tags {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>

        <main>

        <script>
            const INTEL_URL = './data/intel.bin';
            const CACHE_NAME = 'ipblocklist-intel-v1';
            const CACHE_MAX_AGE = 6 * 60 * 60 * 1000;

            const FLAGS = [
                'vpn', 'proxy', 'tor', 'malware', 'c2', 'scanner',
                'brute_force', 'spammer', 'compromised', 'datacenter',
                'cdn', 'anycast', 'crawler', 'bot', 'cloud',
                'private_relay', 'anonymizer', 'mobile', 'isp', 'government',
            ];

            const SEVERITY = {
                malware: 95, c2: 95, compromised: 75, brute_force: 70,
                spammer: 65, scanner: 55, tor: 45, bot: 40, anonymizer: 35,
                vpn: 30, proxy: 25, datacenter: 15, private_relay: 15,
                cloud: 10, crawler: 10, cdn: 5,
                anycast: 0, mobile: 0, isp: 0, government: 0,
            };

            const LEVELS = [
                [80, 'critical'],
                [60, 'high'],
                [35, 'medium'],
                [15, 'low'],
            ];

            let db = null;

            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');
            const lookupBtn = document.getElementById('lookupBtn');
            const queryInput = document.getElementById('queryInput');
            const resultsDiv = document.getElementById('results');
            const resultContent = document.getElementById('resultContent');

            function setStatus(state, text) {
                statusBar.className = 'status-bar ' + state;
                statusText.textContent = text;
            }

            function formatBytes(n) {
                return n >= 1048576
                    ? `${(n / 1048576).toFixed(1)} MB`
                    : `${(n / 1024).toFixed(0)} KB`;
            }

            function formatSpeed(bps) {
                return bps >= 1048576
                    ? `${(bps / 1048576).toFixed(1)} MB/s`
                    : `${(bps / 1024).toFixed(0)} KB/s`;
            }

            async function openCache() {
                try {
                    return await caches.open(CACHE_NAME);
                } catch {
                    return null;
                }
            }

            async function fetchBinaryWithProgress(url, onProgress) {
                const cache = await openCache();
                if (cache) {
                    const hit = await cache.match(url);
                    if (hit) {
                        const age = Date.now() -
                            parseInt(hit.headers.get('x-cached-at') || '0', 10);
                        if (age < CACHE_MAX_AGE) {
                            onProgress(null, null, true, 0);
                            return hit.arrayBuffer();
                        }
                        await cache.delete(url);
                    }
                }

                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(
                        `Missing ${url}. For local preview, download the ` +
                        `latest intel.bin into docs/data/.`
                    );
                }

                const total = parseInt(
                    response.headers.get('content-length') || '0', 10
                );
                const reader = response.body.getReader();
                const chunks = [];
                let received = 0;
                const t0 = Date.now();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    const speed = received /
                        Math.max((Date.now() - t0) / 1000, 0.001);
                    onProgress(received, total, false, speed);
                }

                const bytes = new Uint8Array(received);
                let offset = 0;
                for (const chunk of chunks) {
                    bytes.set(chunk, offset);
                    offset += chunk.length;
                }

                if (cache) {
                    await cache.put(url, new Response(bytes.buffer, {
                        headers: {
                            'content-type': 'application/octet-stream',
                            'x-cached-at': String(Date.now()),
                        },
                    }));
                }

                return bytes.buffer;
            }

            function readU64(view, offset) {
                const lo = view.getUint32(offset, true);
                const hi = view.getUint32(offset + 4, true);
                return Number(BigInt(hi) << 32n | BigInt(lo));
            }

            function readU128(view, offset) {
                const a = view.getBigUint64(offset, true);
                const b = view.getBigUint64(offset + 8, true);
                return (b << 64n) | a;
            }

            function readStrings(bytes, indexOffset, count, dataOffset, dataLen) {
                const view = new DataView(bytes.buffer);
                const data = bytes.subarray(dataOffset, dataOffset + dataLen);
                const decoder = new TextDecoder();
                const out = new Array(count);
                for (let i = 0; i < count; i++) {
                    const o = indexOffset + i * 8;
                    const off = view.getUint32(o, true);
                    const len = view.getUint32(o + 4, true);
                    out[i] = decoder.decode(data.subarray(off, off + len));
                }
                return out;
            }

            const V4_BUCKETS = 65536;

            function parseIntel(buffer) {
                const view = new DataView(buffer);
                const bytes = new Uint8Array(buffer);

                const version = view.getUint32(0, true);
                if (version !== 6) {
                    throw new Error(`Unsupported intel.bin version ${version}`);
                }

                const cn = readU64(view, 8);
                const ln = readU64(view, 16);
                const v6n = readU64(view, 24);
                const valn = readU64(view, 32);
                const strn = readU64(view, 40);
                const bucketOff = readU64(view, 48);
                const startsLoOff = readU64(view, 56);
                const lensOff = readU64(view, 64);
                const valsOff = readU64(view, 72);
                const lStartsOff = readU64(view, 80);
                const lEndsOff = readU64(view, 88);
                const lValsOff = readU64(view, 96);
                const v6s = readU64(view, 104);
                const v6e = readU64(view, 112);
                const v6v = readU64(view, 120);
                const vt = readU64(view, 128);
                const si = readU64(view, 136);
                const sd = readU64(view, 144);
                const sl = readU64(view, 152);

                const bucket_index = new Uint32Array(
                    buffer, bucketOff, V4_BUCKETS + 1
                );
                const starts_lo = cn
                    ? new Uint16Array(buffer, startsLoOff, cn)
                    : new Uint16Array(0);
                const lens = cn
                    ? new Uint16Array(buffer, lensOff, cn)
                    : new Uint16Array(0);
                const vals = cn
                    ? new Uint16Array(buffer, valsOff, cn)
                    : new Uint16Array(0);

                const max_ends_lo = new Uint16Array(cn);
                for (let b = 0; b < V4_BUCKETS; b++) {
                    const s = bucket_index[b];
                    const e = bucket_index[b + 1];
                    let cur = 0;
                    for (let i = s; i < e; i++) {
                        const endLo = (starts_lo[i] + lens[i]) & 0xFFFF;
                        if (endLo > cur) cur = endLo;
                        max_ends_lo[i] = cur;
                    }
                }

                const l_starts = ln
                    ? new Uint32Array(buffer, lStartsOff, ln)
                    : new Uint32Array(0);
                const l_ends = ln
                    ? new Uint32Array(buffer, lEndsOff, ln)
                    : new Uint32Array(0);
                const l_vals = ln
                    ? new Uint16Array(buffer, lValsOff, ln)
                    : new Uint16Array(0);
                const l_max = new Uint32Array(ln);
                let accL = 0;
                for (let i = 0; i < ln; i++) {
                    if (l_ends[i] > accL) accL = l_ends[i];
                    l_max[i] = accL;
                }

                const v6_starts = new Array(v6n);
                const v6_ends = new Array(v6n);
                for (let i = 0; i < v6n; i++) {
                    v6_starts[i] = readU128(view, v6s + i * 16);
                    v6_ends[i] = readU128(view, v6e + i * 16);
                }
                const v6_vals = v6n
                    ? new Uint16Array(buffer, v6v, v6n)
                    : new Uint16Array(0);
                const v6_max = new Array(v6n);
                let acc6 = 0n;
                for (let i = 0; i < v6n; i++) {
                    if (v6_ends[i] > acc6) acc6 = v6_ends[i];
                    v6_max[i] = acc6;
                }

                const values = new Uint32Array(buffer, vt, valn * 4);
                const strings = readStrings(bytes, si, strn, sd, sl);

                const totalV4 = cn + ln;
                const weights = {};
                const total = Math.max(totalV4, 1);
                const flagCounts = new Uint32Array(FLAGS.length);
                const tally = (arr, n) => {
                    for (let i = 0; i < n; i++) {
                        const bits = values[arr[i] * 4];
                        for (let f = 0; f < FLAGS.length; f++) {
                            if (bits & (1 << f)) flagCounts[f]++;
                        }
                    }
                };
                tally(vals, cn);
                tally(l_vals, ln);
                for (let f = 0; f < FLAGS.length; f++) {
                    const prevalence = Math.max(
                        flagCounts[f] / total, 1 / total
                    );
                    const rarity = Math.log2(1 / prevalence);
                    weights[FLAGS[f]] = SEVERITY[FLAGS[f]] * (1 + rarity / 24);
                }

                return {
                    bucket_index, starts_lo, lens, vals, max_ends_lo,
                    l_starts, l_ends, l_vals, l_max,
                    v6_starts, v6_ends, v6_vals, v6_max,
                    values, strings, weights,
                };
            }

            function ipv4ToInt(ip) {
                const p = ip.split('.').map(Number);
                return ((p[0] << 24) | (p[1] << 16) | (p[2] << 8) | p[3]) >>> 0;
            }

            function expandIPv6(ip) {
                if (ip.includes('::')) {
                    const [left, right] = ip.split('::');
                    const leftParts = left ? left.split(':') : [];
                    const rightParts = right ? right.split(':') : [];
                    const missing = 8 - leftParts.length - rightParts.length;
                    const mid = Array(missing).fill('0000');
                    return [...leftParts, ...mid, ...rightParts]
                        .map((p) => p.padStart(4, '0'))
                        .join(':');
                }
                return ip.split(':').map((p) => p.padStart(4, '0')).join(':');
            }

            function ipv6ToBigInt(ip) {
                const parts = expandIPv6(ip).split(':');
                let result = 0n;
                for (const part of parts) {
                    result = (result << 16n) | BigInt(parseInt(part, 16));
                }
                return result;
            }

            function intToIPv4(n) {
                return `${(n >>> 24) & 0xff}.${(n >>> 16) & 0xff}.` +
                    `${(n >>> 8) & 0xff}.${n & 0xff}`;
            }

            function bigIntToIPv6(n) {
                const parts = [];
                for (let i = 7; i >= 0; i--) {
                    const shift = BigInt(i * 16);
                    parts.push(Number((n >> shift) & 0xffffn).toString(16));
                }
                return parts.join(':');
            }

            function isIPv4(s) {
                const parts = s.split('.');
                if (parts.length !== 4) return false;
                return parts.every((p) => {
                    const n = Number(p);
                    return Number.isInteger(n) && n >= 0 && n <= 255 &&
                        String(n) === p;
                });
            }

            function isIPv6(s) {
                return s.includes(':') && /^[0-9a-fA-F:]+$/.test(s);
            }

            function bisectRightBounded(arr, lo, hi, target) {
                while (lo < hi) {
                    const mid = (lo + hi) >>> 1;
                    if (arr[mid] <= target) lo = mid + 1;
                    else hi = mid;
                }
                return lo;
            }

            function bisectRightU32(arr, target) {
                return bisectRightBounded(arr, 0, arr.length, target);
            }

            function bisectRightBig(arr, target) {
                let lo = 0, hi = arr.length;
                while (lo < hi) {
                    const mid = (lo + hi) >>> 1;
                    if (arr[mid] <= target) lo = mid + 1;
                    else hi = mid;
                }
                return lo;
            }

            function decodeValue(valId) {
                const o = valId * 4;
                return {
                    flagsMask: db.values[o],
                    provider: db.strings[db.values[o + 1]],
                    source: db.strings[db.values[o + 2]],
                };
            }

            function flagsFromMask(mask) {
                const out = [];
                for (let i = 0; i < FLAGS.length; i++) {
                    if (mask & (1 << i)) out.push(FLAGS[i]);
                }
                return out;
            }

            function lookupV4(ip) {
                const hits = [];
                const bucket = (ip >>> 16) & 0xFFFF;
                const ipLo = ip & 0xFFFF;
                const bs = db.bucket_index[bucket];
                const be = db.bucket_index[bucket + 1];
                if (bs < be) {
                    const prefix = bucket << 16;
                    let i = bisectRightBounded(db.starts_lo, bs, be, ipLo);
                    while (i > bs) {
                        i--;
                        if (db.max_ends_lo[i] < ipLo) break;
                        const endLo = (db.starts_lo[i] + db.lens[i]) & 0xFFFF;
                        if (endLo >= ipLo) {
                            const v = decodeValue(db.vals[i]);
                            hits.push({
                                start: intToIPv4(
                                    (prefix | db.starts_lo[i]) >>> 0
                                ),
                                end: intToIPv4((prefix | endLo) >>> 0),
                                ...v,
                                flags: flagsFromMask(v.flagsMask),
                            });
                        }
                    }
                }
                if (db.l_starts.length) {
                    let i = bisectRightU32(db.l_starts, ip);
                    while (i > 0) {
                        i--;
                        if (db.l_max[i] < ip) break;
                        if (db.l_ends[i] >= ip) {
                            const v = decodeValue(db.l_vals[i]);
                            hits.push({
                                start: intToIPv4(db.l_starts[i]),
                                end: intToIPv4(db.l_ends[i]),
                                ...v,
                                flags: flagsFromMask(v.flagsMask),
                            });
                        }
                    }
                }
                return hits;
            }

            function lookupV6(ip) {
                const hits = [];
                let i = bisectRightBig(db.v6_starts, ip);
                while (i > 0) {
                    i--;
                    if (db.v6_max[i] < ip) break;
                    if (db.v6_ends[i] >= ip) {
                        const v = decodeValue(db.v6_vals[i]);
                        hits.push({
                            start: bigIntToIPv6(db.v6_starts[i]),
                            end: bigIntToIPv6(db.v6_ends[i]),
                            ...v,
                            flags: flagsFromMask(v.flagsMask),
                        });
                    }
                }
                return hits;
            }

            function computeScore(hits) {
                if (hits.length === 0) {
                    return { score: 0, level: 'unknown', reasons: [], sources: 0 };
                }
                const flagValue = {};
                for (const hit of hits) {
                    for (const flag of hit.flags) {
                        const value = db.weights[flag];
                        if (value > (flagValue[flag] || 0)) flagValue[flag] = value;
                    }
                }
                const entries = Object.entries(flagValue);
                if (entries.length === 0) {
                    return { score: 0, level: 'unknown', reasons: [], sources: 0 };
                }
                entries.sort((a, b) => b[1] - a[1]);
                const top = entries[0][1];
                const extras = entries.slice(1).reduce((s, [, v]) => s + v, 0) * 0.15;
                const sources = new Set(hits.map((h) => `${h.provider}|${h.source}`));
                const boost = 1 + 0.08 * Math.log2(sources.size + 1);
                const score = Math.min(100, (top + extras) * boost);
                return {
                    score: Math.round(score * 10) / 10,
                    level: levelFor(score),
                    reasons: entries.slice(0, 5).map(([f]) => f),
                    sources: sources.size,
                };
            }

            function levelFor(score) {
                for (const [t, name] of LEVELS) {
                    if (score >= t) return name;
                }
                return 'minimal';
            }

            function scoreColor(score) {
                if (score >= 80) return 'var(--danger)';
                if (score >= 60) return 'var(--danger)';
                if (score >= 35) return 'var(--warn)';
                if (score >= 15) return 'var(--info)';
                return 'var(--safe)';
            }

            function verdictClass(score) {
                if (score >= 60) return 'verdict-high';
                if (score >= 35) return 'verdict-medium';
                if (score >= 15) return 'verdict-low';
                return 'verdict-clean';
            }

            function verdictLabel(level) {
                if (level === 'unknown') return 'Clean';
                return level.charAt(0).toUpperCase() + level.slice(1);
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text == null ? '' : String(text);
                return div.innerHTML;
            }

            function renderResults(ipStr, hits) {
                const score = computeScore(hits);
                const allFlags = new Set();
                const providers = new Set();
                const sources = new Set();
                for (const hit of hits) {
                    for (const flag of hit.flags) allFlags.add(flag);
                    if (hit.provider) providers.add(hit.provider);
                    sources.add(hit.source);
                }
                const providerList = [...providers];
                const torIndex = providerList.findIndex(
                    (p) => p.toLowerCase() === 'tor'
                );
                if (torIndex > 0) {
                    providerList.splice(torIndex, 1);
                    providerList.unshift('Tor');
                }
                const topProvider = providerList[0] || '';

                let html = `<div class="result-header">
    <span class="result-ip">${escapeHtml(ipStr)}</span>
    <span class="result-verdict ${verdictClass(score.score)}">
      ${escapeHtml(verdictLabel(score.level))}
    </span>
  </div>`;

                html += `<div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value" style="color:${scoreColor(score.score)}">
        ${score.score.toFixed(1)}<span
          style="color:var(--text-muted);font-size:0.6em"> / 100</span>
      </div>
      <div class="score-bar-outer">
        <div class="score-bar-inner"
          style="width:${score.score}%;background:${scoreColor(score.score)}">
        </div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Detections</div>
      <div class="stat-value">${hits.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sources</div>
      <div class="stat-value">${sources.size}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Flags</div>
      <div class="stat-value">${allFlags.size}</div>
    </div>
  </div>`;

                if (topProvider) {
                    html += `<div class="section-title">Provider</div>
    <div class="stat-card" style="margin-bottom:1.5rem">
      <div class="stat-value">${escapeHtml(topProvider)}</div>
      ${providerList.length > 1
          ? `<div style="color:var(--text-dim);font-size:0.8rem;
              margin-top:0.3rem;font-family:var(--mono)">
              + ${providerList.slice(1).map(escapeHtml).join(', ')}
            </div>`
          : ''}
    </div>`;
                }

                if (allFlags.size > 0) {
                    html += `<div class="section-title">Flags</div>
    <div class="tags">
      ${[...allFlags]
          .map((f) => `<span class="tag tag-flag">${escapeHtml(f)}</span>`)
          .join('')}
    </div>`;
                }

                if (score.reasons.length > 0) {
                    html += `<div class="section-title">Top Reasons</div>
    <div class="tags">
      ${score.reasons
          .map((f) => `<span class="tag tag-cat">${escapeHtml(f)}</span>`)
          .join('')}
    </div>`;
                }

                if (hits.length > 0) {
                    const sorted = [...hits].sort((a, b) => {
                        const sa = Math.max(...a.flags.map((f) => db.weights[f] || 0), 0);
                        const sb = Math.max(...b.flags.map((f) => db.weights[f] || 0), 0);
                        return sb - sa;
                    });
                    html += `<div class="section-title">Matches</div>
    <div class="feed-list">
      ${sorted.map((hit) => {
          const hitMax = Math.max(
              ...hit.flags.map((f) => db.weights[f] || 0), 0
          );
          return `<div class="feed-item">
          <div class="feed-dot"
            style="background:${scoreColor(hitMax)}"></div>
          <div class="feed-name">
            ${escapeHtml(hit.source)}
            ${hit.provider
                ? `<span style="color:var(--text-dim);
                    font-size:0.78em;margin-left:0.4rem">
                    ${escapeHtml(hit.provider)}
                  </span>`
                : ''}
          </div>
          <div class="feed-score" style="color:${scoreColor(hitMax)}">
            ${hitMax.toFixed(0)}
          </div>
          <div class="feed-tags">
            ${hit.flags.slice(0, 4)
                .map((f) => `<span class="feed-tag tag-flag">${escapeHtml(f)}</span>`)
                .join('')}
            ${hit.flags.length > 4
                ? `<span class="feed-tag tag-flag">
                    +${hit.flags.length - 4}
                  </span>`
                : ''}
          </div>
          <div class="tooltip-card">
            <div class="tt-name">${escapeHtml(hit.source)}</div>
            ${hit.provider
                ? `<div class="tt-desc">${escapeHtml(hit.provider)}</div>`
                : ''}
            <div class="tt-row">
              <span>range: <strong>
                ${escapeHtml(hit.start)} – ${escapeHtml(hit.end)}
              </strong></span>
            </div>
            <div class="tt-row" style="margin-top:0.3rem">
              <span>flags: <strong>
                ${hit.flags.join(', ') || 'none'}
              </strong></span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
                } else {
                    html += `<div class="no-matches">
      No detections this IP is not flagged by any source
    </div>`;
                }

                return html;
            }

            async function doLookup() {
                const query = queryInput.value.trim();
                if (!query) return;

                lookupBtn.disabled = true;
                lookupBtn.textContent = 'Searching…';
                resultContent.innerHTML = '';
                resultsDiv.classList.add('visible');

                try {
                    let hits;
                    if (isIPv4(query)) {
                        hits = lookupV4(ipv4ToInt(query));
                    } else if (isIPv6(query)) {
                        hits = lookupV6(ipv6ToBigInt(query));
                    } else {
                        resultContent.innerHTML = `<div class="no-matches">
          Invalid input enter an IPv4 or IPv6 address
        </div>`;
                        lookupBtn.disabled = false;
                        lookupBtn.textContent = 'Lookup';
                        return;
                    }
                    resultContent.innerHTML = renderResults(query, hits);
                } catch (error) {
                    resultContent.innerHTML = `<div class="no-matches"
        style="color:var(--danger)">
        Error: ${escapeHtml(error.message)}
      </div>`;
                }

                lookupBtn.disabled = false;
                lookupBtn.textContent = 'Lookup';
            }

            lookupBtn.addEventListener('click', doLookup);
            queryInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' && !lookupBtn.disabled) doLookup();
            });

            async function init() {
                try {
                    setStatus('loading', 'Loading intel.bin…');
                    const buffer = await fetchBinaryWithProgress(
                        INTEL_URL,
                        (received, total, fromCache, speed) => {
                            if (fromCache) {
                                setStatus('loading', 'Loading intel.bin from cache…');
                                return;
                            }
                            const knownTotal = total > 0 && received <= total;
                            const pct = knownTotal
                                ? ` ${Math.round((received / total) * 100)}%`
                                : '';
                            const size = formatBytes(received) +
                                (knownTotal ? ` / ${formatBytes(total)}` : '');
                            const spd = speed > 0
                                ? ` · ${formatSpeed(speed)}`
                                : '';
                            setStatus(
                                'loading',
                                `Downloading intel.bin…${pct} (${size}${spd})`
                            );
                        }
                    );

                    setStatus('loading', 'Parsing intel.bin…');
                    db = parseIntel(buffer);

                    const v4Total = db.starts_lo.length + db.l_starts.length;
                    setStatus(
                        'ready',
                        `Ready ${v4Total.toLocaleString()} v4 + ` +
                            `${db.v6_starts.length.toLocaleString()} v6 ranges, ` +
                            `${db.strings.length.toLocaleString()} strings`
                    );
                    lookupBtn.disabled = false;
                    queryInput.focus();
                } catch (error) {
                    setStatus('error', error.message || 'Failed to load intel.bin');
                }
            }

            init();
        </script>
    </body>
</html>
