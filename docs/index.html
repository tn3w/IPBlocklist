<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>IPBlocklist — Threat Intelligence Lookup</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0a0a0f;
                --surface: #12121a;
                --surface-2: #1a1a26;
                --surface-3: #22222f;
                --border: #2a2a3a;
                --border-hover: #3a3a5a;
                --text: #e4e4ef;
                --text-dim: #8888a0;
                --text-muted: #55556a;
                --accent: #6366f1;
                --accent-dim: #4f46e5;
                --danger: #ef4444;
                --danger-dim: rgba(239, 68, 68, 0.12);
                --warn: #f59e0b;
                --warn-dim: rgba(245, 158, 11, 0.12);
                --safe: #22c55e;
                --safe-dim: rgba(34, 197, 94, 0.12);
                --info: #3b82f6;
                --info-dim: rgba(59, 130, 246, 0.12);
                --radius: 10px;
                --radius-sm: 6px;
                --mono: 'JetBrains Mono', monospace;
                --sans: 'Outfit', system-ui, sans-serif;
            }

            html {
                font-size: 15px;
            }
            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--sans);
                min-height: 100vh;
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
            }

            .noise {
                position: fixed;
                inset: 0;
                z-index: -1;
                opacity: 0.025;
                pointer-events: none;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            }

            .glow {
                position: fixed;
                top: -200px;
                left: 50%;
                transform: translateX(-50%);
                width: 800px;
                height: 500px;
                background: radial-gradient(ellipse, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
                pointer-events: none;
                z-index: -1;
            }

            header {
                padding: 2.5rem 2rem 0;
                max-width: 900px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
                flex-wrap: wrap;
            }

            .logo-group {
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
                border-radius: 8px;
                background: linear-gradient(135deg, var(--accent), #818cf8);
                display: grid;
                place-items: center;
                font-weight: 800;
                font-size: 1rem;
                color: #fff;
                flex-shrink: 0;
            }

            .logo-text {
                font-weight: 700;
                font-size: 1.35rem;
                letter-spacing: -0.03em;
            }

            .logo-text span {
                color: var(--text-dim);
                font-weight: 400;
            }

            .github-link {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                color: var(--text-dim);
                text-decoration: none;
                font-size: 0.85rem;
                font-weight: 500;
                padding: 0.45rem 0.9rem;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                transition: all 0.2s;
            }
            .github-link:hover {
                color: var(--text);
                border-color: var(--border-hover);
                background: var(--surface);
            }
            .github-link svg {
                width: 18px;
                height: 18px;
            }

            main {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem;
            }

            .search-section {
                margin-bottom: 2.5rem;
            }

            .search-label {
                font-size: 0.78rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
                margin-bottom: 0.6rem;
            }

            .search-box {
                display: flex;
                gap: 0.5rem;
            }

            .search-input {
                flex: 1;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 0.85rem 1.1rem;
                color: var(--text);
                font-family: var(--mono);
                font-size: 0.95rem;
                outline: none;
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
            }
            .search-input::placeholder {
                color: var(--text-muted);
            }
            .search-input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            }

            .search-btn {
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: var(--radius);
                padding: 0.85rem 1.6rem;
                font-family: var(--sans);
                font-weight: 600;
                font-size: 0.9rem;
                cursor: pointer;
                transition:
                    background 0.2s,
                    transform 0.1s;
                white-space: nowrap;
            }
            .search-btn:hover {
                background: var(--accent-dim);
            }
            .search-btn:active {
                transform: scale(0.97);
            }
            .search-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .status-bar {
                margin-top: 0.8rem;
                font-size: 0.8rem;
                color: var(--text-muted);
                font-family: var(--mono);
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .status-bar .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--text-muted);
                flex-shrink: 0;
            }
            .status-bar.ready .dot {
                background: var(--safe);
            }
            .status-bar.loading .dot {
                background: var(--warn);
                animation: pulse 1s ease infinite;
            }
            .status-bar.error .dot {
                background: var(--danger);
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            #results {
                display: none;
            }
            #results.visible {
                display: block;
            }

            .result-header {
                display: flex;
                align-items: baseline;
                gap: 1rem;
                margin-bottom: 1.5rem;
                flex-wrap: wrap;
            }

            .result-ip {
                font-family: var(--mono);
                font-size: 1.5rem;
                font-weight: 700;
                letter-spacing: -0.02em;
            }

            .result-verdict {
                font-size: 0.82rem;
                font-weight: 600;
                padding: 0.3rem 0.75rem;
                border-radius: 20px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .verdict-high {
                background: var(--danger-dim);
                color: var(--danger);
            }
            .verdict-medium {
                background: var(--warn-dim);
                color: var(--warn);
            }
            .verdict-low {
                background: var(--info-dim);
                color: var(--info);
            }
            .verdict-clean {
                background: var(--safe-dim);
                color: var(--safe);
            }

            .stats-row {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 0.75rem;
                margin-bottom: 2rem;
            }

            .stat-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 1rem 1.1rem;
            }

            .stat-label {
                font-size: 0.72rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
                margin-bottom: 0.3rem;
            }

            .stat-value {
                font-family: var(--mono);
                font-size: 1.2rem;
                font-weight: 600;
            }

            .section-title {
                font-size: 0.78rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
                margin-bottom: 0.8rem;
                margin-top: 1.5rem;
            }

            .tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.4rem;
                margin-bottom: 1.5rem;
            }

            .tag {
                font-size: 0.78rem;
                font-weight: 500;
                padding: 0.3rem 0.7rem;
                border-radius: 20px;
                font-family: var(--mono);
            }

            .tag-flag {
                background: rgba(99, 102, 241, 0.12);
                color: #818cf8;
            }
            .tag-cat {
                background: rgba(245, 158, 11, 0.12);
                color: #fbbf24;
            }

            .feed-list {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                margin-bottom: 2rem;
            }

            .feed-item {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 0.85rem 1rem;
                display: flex;
                align-items: center;
                gap: 0.75rem;
                cursor: default;
                position: relative;
                transition: border-color 0.2s;
            }
            .feed-item:hover {
                border-color: var(--border-hover);
            }

            .feed-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }

            .feed-name {
                font-family: var(--mono);
                font-size: 0.85rem;
                font-weight: 500;
                flex: 1;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .feed-score {
                font-family: var(--mono);
                font-size: 0.8rem;
                font-weight: 600;
                flex-shrink: 0;
            }

            .feed-tags {
                display: flex;
                gap: 0.3rem;
                flex-shrink: 0;
                flex-wrap: wrap;
            }

            .feed-tag {
                font-size: 0.68rem;
                padding: 0.15rem 0.45rem;
                border-radius: 12px;
                font-family: var(--mono);
            }

            .tooltip-card {
                display: none;
                position: absolute;
                bottom: calc(100% + 8px);
                left: 0;
                right: 0;
                background: var(--surface-2);
                border: 1px solid var(--border-hover);
                border-radius: var(--radius);
                padding: 1rem;
                z-index: 100;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
                font-size: 0.82rem;
                line-height: 1.6;
                animation: fadeUp 0.15s ease;
            }

            .feed-item:hover .tooltip-card {
                display: block;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(4px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .tooltip-card .tt-name {
                font-weight: 700;
                font-size: 0.9rem;
                margin-bottom: 0.3rem;
            }
            .tooltip-card .tt-desc {
                color: var(--text-dim);
                margin-bottom: 0.5rem;
            }
            .tooltip-card .tt-row {
                display: flex;
                gap: 0.5rem;
                color: var(--text-dim);
                font-family: var(--mono);
                font-size: 0.75rem;
            }
            .tooltip-card .tt-row strong {
                color: var(--text);
                font-weight: 500;
            }

            .score-bar-outer {
                width: 100%;
                height: 6px;
                background: var(--surface-3);
                border-radius: 3px;
                overflow: hidden;
                margin-top: 0.3rem;
            }
            .score-bar-inner {
                height: 100%;
                border-radius: 3px;
                transition: width 0.4s ease;
            }

            .asn-section {
                margin-bottom: 2rem;
            }

            .prefix-list {
                display: flex;
                flex-wrap: wrap;
                gap: 0.35rem;
                max-height: 220px;
                overflow-y: auto;
                margin-bottom: 1.5rem;
                padding: 0.75rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
            }

            .prefix-tag {
                font-family: var(--mono);
                font-size: 0.76rem;
                padding: 0.2rem 0.5rem;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text-dim);
            }

            .no-matches {
                color: var(--text-dim);
                font-size: 0.9rem;
                padding: 2rem;
                text-align: center;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
            }

            .spinner {
                display: inline-block;
                width: 14px;
                height: 14px;
                border: 2px solid var(--border);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            footer {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem;
                text-align: center;
                font-size: 0.78rem;
                color: var(--text-muted);
                border-top: 1px solid var(--border);
            }

            @media (max-width: 600px) {
                header {
                    padding: 1.5rem 1rem 0;
                }
                main {
                    padding: 1.5rem 1rem;
                }
                .search-box {
                    flex-direction: column;
                }
                .stats-row {
                    grid-template-columns: 1fr 1fr;
                }
                .feed-item {
                    flex-wrap: wrap;
                }
                .feed-tags {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>

        <script>
            const BLOCKLIST_URL = './data/blocklist.bin';
            const FEEDS_URL =
                'https://raw.githubusercontent.com/tn3w/IPBlocklist/master/feeds.json';
            const ASNS_URL = './data/asns.json';
            const ASN_CACHE_URL = './data/asn_prefixes.json';
            const CACHE_NAME = 'ipblocklist-v2';
            const CACHE_MAX_AGE = 6 * 60 * 60 * 1000;

            let blocklist = null;
            let feedsMeta = null;
            let asnsData = null;
            let asnCacheData = null;

            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');
            const lookupBtn = document.getElementById('lookupBtn');
            const queryInput = document.getElementById('queryInput');
            const resultsDiv = document.getElementById('results');
            const resultContent = document.getElementById('resultContent');

            function setStatus(state, text) {
                statusBar.className = 'status-bar ' + state;
                statusText.textContent = text;
            }

            function assetErrorMessage(path) {
                return (
                    `Missing ${path}. For local preview, download the latest ` +
                    `release files into docs/data/.`
                );
            }

            function formatBytes(n) {
                return n >= 1048576
                    ? `${(n / 1048576).toFixed(1)} MB`
                    : `${(n / 1024).toFixed(0)} KB`;
            }

            function formatSpeed(bps) {
                return bps >= 1048576
                    ? `${(bps / 1048576).toFixed(1)} MB/s`
                    : `${(bps / 1024).toFixed(0)} KB/s`;
            }

            async function openCache() {
                try {
                    return await caches.open(CACHE_NAME);
                } catch {
                    return null;
                }
            }

            async function fetchBinaryWithProgress(url, onProgress) {
                const cache = await openCache();
                if (cache) {
                    const hit = await cache.match(url);
                    if (hit) {
                        const age =
                            Date.now() - parseInt(hit.headers.get('x-cached-at') || '0', 10);
                        if (age < CACHE_MAX_AGE) {
                            onProgress(null, null, true, 0);
                            return hit.arrayBuffer();
                        }
                        await cache.delete(url);
                    }
                }

                const response = await fetch(url);
                if (!response.ok) throw new Error(assetErrorMessage(url));

                const total = parseInt(response.headers.get('content-length') || '0', 10);
                const reader = response.body.getReader();
                const chunks = [];
                let received = 0;
                const t0 = Date.now();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    const speed = received / Math.max((Date.now() - t0) / 1000, 0.001);
                    onProgress(received, total, false, speed);
                }

                const bytes = new Uint8Array(received);
                let offset = 0;
                for (const chunk of chunks) {
                    bytes.set(chunk, offset);
                    offset += chunk.length;
                }

                if (cache) {
                    await cache.put(
                        url,
                        new Response(bytes.buffer, {
                            headers: {
                                'content-type': 'application/octet-stream',
                                'x-cached-at': String(Date.now()),
                            },
                        })
                    );
                }

                return bytes.buffer;
            }

            async function fetchJsonCached(url, fallbackMessage) {
                const cache = await openCache();
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(fallbackMessage || assetErrorMessage(url));
                    const data = await response.json();
                    if (cache) {
                        await cache.put(
                            url,
                            new Response(JSON.stringify(data), {
                                headers: {
                                    'content-type': 'application/json',
                                    'x-cached-at': String(Date.now()),
                                },
                            })
                        );
                    }
                    return data;
                } catch (networkError) {
                    if (cache) {
                        const hit = await cache.match(url);
                        if (hit) return hit.json();
                    }
                    throw networkError;
                }
            }

            function readVarint(view, pos) {
                let result = 0n,
                    shift = 0n;
                while (true) {
                    const byte = view.getUint8(pos.v++);
                    result |= BigInt(byte & 0x7f) << shift;
                    if (!(byte & 0x80)) return result;
                    shift += 7n;
                }
            }

            function parseBlocklist(buffer) {
                const view = new DataView(buffer);
                const bytes = new Uint8Array(buffer);
                let pos = 0;

                const magic = String.fromCharCode(...bytes.slice(0, 4));
                if (magic !== 'IPBL') throw new Error('Invalid magic');
                pos = 4;

                const version = bytes[pos++];
                if (version !== 2) throw new Error('Unsupported version');

                const timestamp = view.getUint32(pos, true);
                pos += 4;

                const decoder = new TextDecoder();

                const flagCount = bytes[pos++];
                const flags = [];
                for (let i = 0; i < flagCount; i++) {
                    const len = bytes[pos++];
                    flags.push(decoder.decode(bytes.slice(pos, pos + len)));
                    pos += len;
                }

                const catCount = bytes[pos++];
                const categories = [];
                for (let i = 0; i < catCount; i++) {
                    const len = bytes[pos++];
                    categories.push(decoder.decode(bytes.slice(pos, pos + len)));
                    pos += len;
                }

                const feedCount = view.getUint16(pos, true);
                pos += 2;
                const feeds = [];

                for (let i = 0; i < feedCount; i++) {
                    const nameLen = bytes[pos++];
                    const name = decoder.decode(bytes.slice(pos, pos + nameLen));
                    pos += nameLen;

                    const baseScore = bytes[pos++];
                    const confidence = bytes[pos++];
                    const flagsMask = view.getUint32(pos, true);
                    pos += 4;
                    const categoriesMask = bytes[pos++];
                    const rangeCount = view.getUint32(pos, true);
                    pos += 4;

                    const ipv4Starts = [];
                    const ipv4Ends = [];
                    const ipv6Starts = [];
                    const ipv6Ends = [];
                    let current = 0n;
                    const posRef = { v: pos };

                    for (let r = 0; r < rangeCount; r++) {
                        current += readVarint(view, posRef);
                        const size = readVarint(view, posRef);
                        const end = current + size;

                        if (end <= 0xffffffffn) {
                            ipv4Starts.push(Number(current));
                            ipv4Ends.push(Number(end));
                        } else {
                            ipv6Starts.push(current);
                            ipv6Ends.push(end);
                        }
                    }

                    pos = posRef.v;
                    feeds.push({
                        name,
                        baseScore,
                        confidence,
                        flagsMask,
                        categoriesMask,
                        ipv4Starts,
                        ipv4Ends,
                        ipv6Starts,
                        ipv6Ends,
                    });
                }

                return { timestamp, flags, categories, feeds };
            }

            function ipv4ToInt(ip) {
                const p = ip.split('.').map(Number);
                return ((p[0] << 24) | (p[1] << 16) | (p[2] << 8) | p[3]) >>> 0;
            }

            function ipv6ToBigInt(ip) {
                let full = expandIPv6(ip);
                const parts = full.split(':');
                let result = 0n;
                for (const part of parts) {
                    result = (result << 16n) | BigInt(parseInt(part, 16));
                }
                return result;
            }

            function expandIPv6(ip) {
                if (ip.includes('::')) {
                    const [left, right] = ip.split('::');
                    const leftParts = left ? left.split(':') : [];
                    const rightParts = right ? right.split(':') : [];
                    const missing = 8 - leftParts.length - rightParts.length;
                    const mid = Array(missing).fill('0000');
                    const all = [...leftParts, ...mid, ...rightParts];
                    return all.map((p) => p.padStart(4, '0')).join(':');
                }
                return ip
                    .split(':')
                    .map((p) => p.padStart(4, '0'))
                    .join(':');
            }

            function isIPv4(s) {
                const parts = s.split('.');
                if (parts.length !== 4) return false;
                return parts.every((p) => {
                    const n = Number(p);
                    return Number.isInteger(n) && n >= 0 && n <= 255 && String(n) === p;
                });
            }

            function isIPv6(s) {
                return s.includes(':') && /^[0-9a-fA-F:]+$/.test(s);
            }

            function isASN(s) {
                return /^(AS|as)?\d+$/.test(s.trim());
            }

            function normalizeASN(s) {
                return s.trim().replace(/^(AS|as)/i, '');
            }

            function bisectRight(arr, target) {
                let lo = 0,
                    hi = arr.length;
                while (lo < hi) {
                    const mid = (lo + hi) >>> 1;
                    if (arr[mid] <= target) lo = mid + 1;
                    else hi = mid;
                }
                return lo;
            }

            function bisectRightBig(arr, target) {
                let lo = 0,
                    hi = arr.length;
                while (lo < hi) {
                    const mid = (lo + hi) >>> 1;
                    if (arr[mid] <= target) lo = mid + 1;
                    else hi = mid;
                }
                return lo;
            }

            function lookupIP(ipStr) {
                const matches = [];
                const isV4 = isIPv4(ipStr);

                if (isV4) {
                    const target = ipv4ToInt(ipStr);
                    for (const feed of blocklist.feeds) {
                        const idx = bisectRight(feed.ipv4Starts, target) - 1;
                        if (idx >= 0 && target <= feed.ipv4Ends[idx]) {
                            matches.push(feed);
                        }
                    }
                } else {
                    const target = ipv6ToBigInt(ipStr);
                    for (const feed of blocklist.feeds) {
                        const idx = bisectRightBig(feed.ipv6Starts, target) - 1;
                        if (idx >= 0 && target <= feed.ipv6Ends[idx]) {
                            matches.push(feed);
                        }
                    }
                }

                return matches;
            }

            function lookupASN(asnNumber) {
                const results = [];
                if (!asnsData) return results;

                for (const [feedName, asnList] of Object.entries(asnsData)) {
                    if (asnList.includes(asnNumber)) {
                        results.push(feedName);
                    }
                }
                return results;
            }

            function lookupASNRanges(asnNumber) {
                return asnCacheData?.[asnNumber] ?? [];
            }

            function parseCsvLine(line) {
                const values = [];
                let current = '';
                let inQuotes = false;

                for (let index = 0; index < line.length; index++) {
                    const character = line[index];

                    if (character === '"') {
                        if (inQuotes && line[index + 1] === '"') {
                            current += '"';
                            index++;
                            continue;
                        }

                        inQuotes = !inQuotes;
                        continue;
                    }

                    if (character === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                        continue;
                    }

                    current += character;
                }

                values.push(current.trim());
                return values;
            }

            function cleanCsvValue(value) {
                return value.replace(/^"+|"+$/g, '').trim();
            }

            function isAsnField(value) {
                return /^(?:AS)?\d+$/i.test(value);
            }

            function isTextualAsnName(value) {
                if (!value) return false;
                if (isAsnField(value)) return false;
                if (/^[A-Z]{2}$/.test(value)) return false;
                if (/^\d+$/.test(value)) return false;
                if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
                if (/^\d{8}$/.test(value)) return false;
                if (/^[0-9a-fA-F:.]+(?:\/\d+)?$/.test(value)) return false;
                return true;
            }

            function lookupASNFromPrefixes(ipStr) {
                if (!asnCacheData) return null;
                const v4 = isIPv4(ipStr);
                if (!v4 && !isIPv6(ipStr)) return null;

                const target = v4 ? ipv4ToInt(ipStr) : ipv6ToBigInt(ipStr);

                for (const [asn, prefixes] of Object.entries(asnCacheData)) {
                    for (const cidr of prefixes) {
                        const slash = cidr.indexOf('/');
                        if (slash < 0) continue;
                        const addr = cidr.substring(0, slash);
                        const bits = parseInt(cidr.substring(slash + 1));

                        if (v4 && isIPv4(addr)) {
                            const base = ipv4ToInt(addr);
                            const hb = 32 - bits;
                            if (hb > 31) continue;
                            const mask = (-1 << hb) >>> 0;
                            const start = (base & mask) >>> 0;
                            const end = (start | (~mask >>> 0)) >>> 0;
                            if (target >= start && target <= end) {
                                return { asn, name: '' };
                            }
                        } else if (!v4 && addr.includes(':')) {
                            const base = ipv6ToBigInt(addr);
                            const shift = 128n - BigInt(bits);
                            const size = shift >= 128n ? 0n : (1n << shift) - 1n;
                            const mask = ((1n << 128n) - 1n) ^ size;
                            const start = base & mask;
                            const end = start | size;
                            if (target >= start && target <= end) {
                                return { asn, name: '' };
                            }
                        }
                    }
                }
                return null;
            }

            function scoreColor(score) {
                if (score >= 0.7) return 'var(--danger)';
                if (score >= 0.4) return 'var(--warn)';
                if (score >= 0.1) return 'var(--info)';
                return 'var(--safe)';
            }

            function verdictClass(score) {
                if (score >= 0.7) return 'verdict-high';
                if (score >= 0.4) return 'verdict-medium';
                if (score >= 0.1) return 'verdict-low';
                return 'verdict-clean';
            }

            function verdictLabel(score) {
                if (score >= 0.7) return 'High Risk';
                if (score >= 0.4) return 'Medium Risk';
                if (score >= 0.1) return 'Low Risk';
                return 'Clean';
            }

            function getFeedMeta(name) {
                if (!feedsMeta) return null;
                return feedsMeta.find((f) => f.name === name) || null;
            }

            function getFeedFlags(feed) {
                return blocklist.flags.filter((_, i) => feed.flagsMask & (1 << i));
            }

            function getFeedCats(feed) {
                return blocklist.categories.filter((_, i) => feed.categoriesMask & (1 << i));
            }

            function feedScore(feed) {
                return (feed.baseScore / 200) * (feed.confidence / 200);
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function renderFeedTooltip(feed) {
                const meta = getFeedMeta(feed.name);
                if (!meta) return '';

                return `<div class="tooltip-card">
    <div class="tt-name">${escapeHtml(meta.name)}</div>
    <div class="tt-desc">
      ${escapeHtml(meta.description || 'No description')}
    </div>
    <div class="tt-row">
      <span>base_score: <strong>
        ${meta.base_score}
      </strong></span>
      <span>confidence: <strong>
        ${meta.confidence}
      </strong></span>
    </div>
    ${
        meta.provider_name
            ? `<div class="tt-row">
      <span>provider: <strong>
        ${escapeHtml(meta.provider_name)}
      </strong></span>
    </div>`
            : ''
    }
    <div class="tt-row" style="margin-top:0.3rem">
      <span>flags: <strong>
        ${(meta.flags || []).join(', ') || 'none'}
      </strong></span>
    </div>
    <div class="tt-row">
      <span>categories: <strong>
        ${(meta.categories || []).join(', ') || 'none'}
      </strong></span>
    </div>
  </div>`;
            }

            function renderIPResults(ipStr, matches, asnInfo, asnMatches) {
                const allFlags = new Set();
                const allCats = new Set();
                const catCounts = {};
                let maxScore = 0;
                let totalScore = 0;

                for (const feed of matches) {
                    const s = feedScore(feed);
                    totalScore += s;
                    if (s > maxScore) maxScore = s;
                    for (const f of getFeedFlags(feed)) allFlags.add(f);
                    for (const c of getFeedCats(feed)) {
                        allCats.add(c);
                        catCounts[c] = (catCounts[c] || 0) + 1;
                    }
                }

                const topCategory =
                    Object.entries(catCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || 'none';

                let html = `<div class="result-header">
    <span class="result-ip">${escapeHtml(ipStr)}</span>
    <span class="result-verdict ${verdictClass(maxScore)}">
      ${verdictLabel(maxScore)}
    </span>
  </div>`;

                html += `<div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Detections</div>
      <div class="stat-value">${matches.length}<span
        style="color:var(--text-muted);font-size:0.75em">
        / ${blocklist.feeds.length}</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Max Score</div>
      <div class="stat-value"
        style="color:${scoreColor(maxScore)}">
        ${maxScore.toFixed(2)}
      </div>
      <div class="score-bar-outer">
        <div class="score-bar-inner"
          style="width:${maxScore * 100}%;
          background:${scoreColor(maxScore)}"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top Category</div>
      <div class="stat-value">${topCategory}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Flags</div>
      <div class="stat-value">${allFlags.size}</div>
    </div>
  </div>`;

                if (allCats.size > 0) {
                    html += `<div class="section-title">Categories</div>
    <div class="tags">
      ${[...allCats]
          .map(
              (c) => `<span class="tag tag-cat">
        ${c}
        <span style="opacity:0.6;margin-left:0.2rem">
          ×${catCounts[c]}</span>
      </span>`
          )
          .join('')}
    </div>`;
                }

                if (allFlags.size > 0) {
                    html += `<div class="section-title">Flags</div>
    <div class="tags">
      ${[...allFlags].map((f) => `<span class="tag tag-flag">${f}</span>`).join('')}
    </div>`;
                }

                if (matches.length > 0) {
                    const sorted = [...matches].sort((a, b) => feedScore(b) - feedScore(a));
                    html += `<div class="section-title">
      Feed Detections
    </div>
    <div class="feed-list">
      ${sorted
          .map((feed) => {
              const s = feedScore(feed);
              const flags = getFeedFlags(feed);
              const cats = getFeedCats(feed);
              return `<div class="feed-item">
          <div class="feed-dot"
            style="background:${scoreColor(s)}"></div>
          <div class="feed-name">${escapeHtml(feed.name)}</div>
          <div class="feed-score"
            style="color:${scoreColor(s)}">
            ${s.toFixed(2)}
          </div>
          <div class="feed-tags">
            ${cats.map((c) => `<span class="feed-tag tag-cat">${c}</span>`).join('')}
            ${flags
                .slice(0, 3)
                .map((f) => `<span class="feed-tag tag-flag">${f}</span>`)
                .join('')}
            ${
                flags.length > 3
                    ? `<span class="feed-tag tag-flag">
                  +${flags.length - 3}
                </span>`
                    : ''
            }
          </div>
          ${renderFeedTooltip(feed)}
        </div>`;
          })
          .join('')}
    </div>`;
                } else {
                    html += `<div class="no-matches">
      No feed detections for this IP
    </div>`;
                }

                if (asnInfo) {
                    html += `<div class="section-title">
      ASN Information
    </div>`;
                    html += `<div class="stat-card" style="margin-bottom:1rem">
      <div class="stat-label">
        Autonomous System
      </div>
      <div class="stat-value">
        AS${escapeHtml(asnInfo.asn)}
        ${
            asnInfo.name
                ? `<span style="color:var(--text-dim);
              font-size:0.75em;margin-left:0.5rem">
              ${escapeHtml(asnInfo.name)}
            </span>`
                : ''
        }
      </div>
    </div>`;

                    if (asnMatches.length > 0) {
                        html += `<div class="section-title">
        ASN Feed Matches
      </div>
      <div class="feed-list">
        ${asnMatches
            .map(
                (name) => `<div class="feed-item">
          <div class="feed-dot"
            style="background:var(--accent)"></div>
          <div class="feed-name">${escapeHtml(name)}</div>
        </div>`
            )
            .join('')}
      </div>`;
                    }

                    const asnRanges = lookupASNRanges(asnInfo.asn);
                    if (asnRanges.length > 0) {
                        html += `<div class="section-title">
        Announced Prefixes (${asnRanges.length})
      </div>
      <div class="prefix-list">
        ${asnRanges.map((p) => `<span class="prefix-tag">${escapeHtml(p)}</span>`).join('')}
      </div>`;
                    }
                }

                return html;
            }

            function renderASNResults(asnNumber, asnMatches) {
                let html = `<div class="result-header">
    <span class="result-ip">AS${escapeHtml(asnNumber)}</span>
    <span class="result-verdict ${asnMatches.length > 0 ? 'verdict-medium' : 'verdict-clean'}">
      ${
          asnMatches.length > 0
              ? `${asnMatches.length} Match${asnMatches.length > 1 ? 'es' : ''}`
              : 'Not Listed'
      }
    </span>
  </div>`;

                html += `<div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Feed Matches</div>
      <div class="stat-value">${asnMatches.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total ASN Feeds</div>
      <div class="stat-value">
        ${asnsData ? Object.keys(asnsData).length : 0}
      </div>
    </div>
  </div>`;

                if (asnMatches.length > 0) {
                    html += `<div class="section-title">
      ASN Feed Detections
    </div>
    <div class="feed-list">
      ${asnMatches
          .map(
              (name) => `<div class="feed-item">
        <div class="feed-dot"
          style="background:var(--accent)"></div>
        <div class="feed-name">${escapeHtml(name)}</div>
      </div>`
          )
          .join('')}
    </div>`;
                } else {
                    html += `<div class="no-matches">
      This ASN is not listed in any feed
    </div>`;
                }

                const asnRanges = lookupASNRanges(asnNumber);
                if (asnRanges.length > 0) {
                    html += `<div class="section-title">
      Announced Prefixes (${asnRanges.length})
    </div>
    <div class="prefix-list">
      ${asnRanges.map((p) => `<span class="prefix-tag">${escapeHtml(p)}</span>`).join('')}
    </div>`;
                }

                return html;
            }

            async function doLookup() {
                const query = queryInput.value.trim();
                if (!query) return;

                lookupBtn.disabled = true;
                lookupBtn.textContent = 'Searching…';
                resultContent.innerHTML = '';
                resultsDiv.classList.add('visible');

                try {
                    if (isASN(query)) {
                        const asnNumber = normalizeASN(query);
                        const asnMatches = lookupASN(asnNumber);
                        resultContent.innerHTML = renderASNResults(asnNumber, asnMatches);
                    } else if (isIPv4(query) || isIPv6(query)) {
                        const matches = lookupIP(query);

                        const asnInfo = lookupASNFromPrefixes(query);

                        let asnMatches = [];
                        if (asnInfo) {
                            asnMatches = lookupASN(asnInfo.asn);
                        }

                        resultContent.innerHTML = renderIPResults(
                            query,
                            matches,
                            asnInfo,
                            asnMatches
                        );
                    } else {
                        resultContent.innerHTML = `<div class="no-matches">
          Invalid input — enter an IPv4/IPv6 address
          or ASN (e.g. AS13335)
        </div>`;
                    }
                } catch (error) {
                    resultContent.innerHTML = `<div class="no-matches" style="color:var(--danger)">
        Error: ${escapeHtml(error.message)}
      </div>`;
                }

                lookupBtn.disabled = false;
                lookupBtn.textContent = 'Lookup';
            }

            lookupBtn.addEventListener('click', doLookup);
            queryInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' && !lookupBtn.disabled) doLookup();
            });

            async function init() {
                try {
                    setStatus('loading', 'Loading blocklist…');

                    const jsonPromise = Promise.all([
                        fetchJsonCached(FEEDS_URL, 'Failed to load feeds metadata.'),
                        fetchJsonCached(ASNS_URL),
                        fetchJsonCached(ASN_CACHE_URL),
                    ]);

                    const buffer = await fetchBinaryWithProgress(
                        BLOCKLIST_URL,
                        (received, total, fromCache, speed) => {
                            if (fromCache) {
                                setStatus('loading', 'Loading blocklist from cache…');
                                return;
                            }
                            const knownTotal = total > 0 && received <= total;
                            const pct = knownTotal
                                ? ` ${Math.round((received / total) * 100)}%`
                                : '';
                            const size =
                                formatBytes(received) +
                                (knownTotal ? ` / ${formatBytes(total)}` : '');
                            const spd = speed > 0 ? ` · ${formatSpeed(speed)}` : '';
                            setStatus('loading', `Downloading blocklist…${pct} (${size}${spd})`);
                        }
                    );

                    const [loadedFeedsMeta, loadedAsnsData, loadedAsnCacheData] = await jsonPromise;

                    setStatus('loading', 'Parsing blocklist…');
                    blocklist = parseBlocklist(buffer);
                    feedsMeta = loadedFeedsMeta;
                    asnsData = loadedAsnsData;
                    asnCacheData = loadedAsnCacheData;

                    const date = new Date(blocklist.timestamp * 1000);
                    setStatus(
                        'ready',
                        `Ready — ${blocklist.feeds.length} feeds, ` +
                            `updated ${date.toLocaleDateString()}`
                    );
                    lookupBtn.disabled = false;
                    queryInput.focus();
                } catch (error) {
                    setStatus('error', error.message || 'Failed to load data');
                }
            }

            init();
        </script>
    </body>
</html>
