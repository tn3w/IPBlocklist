name: Build

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [master]
    paths:
      - 'feeds.json'
      - 'feeds-intel.json'
      - 'aggregator.py'
      - 'builder/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_CF: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - name: Build intel builder
        run: cargo build --release
        working-directory: builder

      - name: Download ASNDB assets
        run: |
          curl -fL -o asndb-mini.bin \
            https://github.com/tn3w/ASNDB/releases/latest/download/asndb-mini.bin
          curl -fL -o asn-provider.tsv \
            https://github.com/tn3w/ASNDB/releases/latest/download/asn-provider.tsv

      - name: Download and process feeds (legacy)
        run: python aggregator.py
        env:
          ASNDB_FILE: asndb-mini.bin

      - name: Build intel.bin + blocklist.netset
        run: ./builder/target/release/builder update
        env:
          FEEDS_FILE: feeds-intel.json
          OUT_FILE: intel.bin
          BLOCKLIST_FILE: blocklist.netset
          BLOCKLIST_THRESHOLD: '40'
          ASNDB_FILE: asndb-mini.bin
          ASN_PROVIDER_FILE: asn-provider.tsv
          PEERINGDB_API_KEY: ${{ secrets.PEERINGDB_API_KEY }}

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TAG_NAME="v$(date -u +%Y%m%d-%H%M%S)"

          gh release create "$TAG_NAME" \
            blocklist.bin \
            blocklist.netset \
            intel.bin \
            asns.json \
            --title "Blocklist Update - $TIMESTAMP" \
            --notes "Automated blocklist update from threat intelligence feeds.

          **Files:**
          - \`blocklist.bin\` - Legacy scored blocklist (binary format)
          - \`blocklist.netset\` - CIDR netset (FireHOL-style header, threshold 40, plain text)
          - \`intel.bin\` - Threat-intel SoA database built from feeds-intel.json
          - \`asns.json\` - Normalized ASN lists keyed by feed name

          **Download:**
          \`\`\`bash
          wget https://github.com/tn3w/IPBlocklist/releases/download/$TAG_NAME/blocklist.bin
          wget https://github.com/tn3w/IPBlocklist/releases/download/$TAG_NAME/blocklist.netset
          wget https://github.com/tn3w/IPBlocklist/releases/download/$TAG_NAME/intel.bin
          wget https://github.com/tn3w/IPBlocklist/releases/download/$TAG_NAME/asns.json
          \`\`\`"

      - name: Clean up old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEEP=5
          gh release list --limit 100 --json tagName --jq '.[].tagName' \
            | tail -n +$((KEEP + 1)) \
            | while read -r tag; do
                echo "Deleting release and tag: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done

      - name: Setup Node
        if: env.HAS_CF == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Deploy Worker
        if: env.HAS_CF == 'true'
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
        run: |
          sed -i "s/\"KV_NAMESPACE_ID\"/\"${KV_NAMESPACE_ID}\"/" ../wrangler.jsonc
          npm ci
          npm run upload
          npm run deploy
